<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azoric Peptides — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7f5;
    --surface: #ffffff;
    --border: #d4e0d4;
    --accent: #6a9b7e;
    --accent2: #e4efe8;
    --accent-dark: #4a7a5e;
    --text: #1f2d25;
    --muted: #7a9485;
    --danger: #c0392b;
    --warn: #e67e22;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; padding: 40px 20px 80px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(106,155,126,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(106,155,126,0.06) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .page { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

  /* Login */
  .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 40px 36px; width: 100%; max-width: 360px; text-align: center; }
  .login-box h2 { font-family: var(--sans); font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .login-box h2 span { color: var(--accent); }
  .login-box p { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 28px; }
  .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 14px; padding: 12px 14px; border-radius: 3px; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 12px; }
  .login-input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; background: var(--accent); color: #fff; border: none; font-family: var(--sans); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 13px; border-radius: 3px; cursor: pointer; }
  .login-btn:hover { background: var(--accent-dark); }
  .login-error { font-size: 11px; color: var(--danger); margin-top: 8px; display: none; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 16px; }
  .logo-block h1 { font-family: var(--sans); font-size: 26px; font-weight: 800; color: var(--text); }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .back-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-dark); text-decoration: none; background: var(--accent2); border: 1px solid var(--accent); padding: 8px 16px; border-radius: 3px; white-space: nowrap; }
  .back-btn:hover { background: var(--accent); color: #fff; }
  .admin-tag { background: #fff3cd; border: 1px solid #ffc107; color: #856404; font-size: 11px; letter-spacing: 2px; padding: 6px 14px; text-transform: uppercase; border-radius: 2px; }

  /* Section label */
  .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-dark); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; }
  .stat-card .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-family: var(--sans); font-size: 28px; font-weight: 800; color: var(--accent-dark); }

  /* Table */
  .inv-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
  .inv-table thead tr { background: var(--accent2); border-bottom: 1px solid var(--border); }
  .inv-table th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 10px 14px; text-align: left; font-weight: 400; }
  .inv-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .inv-table tbody tr:last-child { border-bottom: none; }
  .inv-table tbody tr:hover { background: #f0f6f2; }
  .inv-table td { padding: 10px 14px; vertical-align: middle; font-size: 13px; }
  .compound-name { font-weight: 500; color: var(--text); }
  .compound-dose { font-size: 11px; color: var(--accent); }

  /* Stock bar */
  .stock-display { display: flex; align-items: center; gap: 8px; }
  .stock-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 60px; }
  .stock-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .stock-bar.high { background: var(--accent); }
  .stock-bar.low { background: var(--warn); }
  .stock-bar.out { background: var(--danger); }
  .stock-num { font-size: 13px; font-weight: 500; min-width: 24px; text-align: right; }
  .stock-num.high { color: var(--accent-dark); }
  .stock-num.low { color: var(--warn); }
  .badge { font-size: 9px; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; white-space: nowrap; }
  .badge.in { background: rgba(106,155,126,0.12); color: var(--accent-dark); border: 1px solid rgba(106,155,126,0.25); }
  .badge.low { background: rgba(230,126,34,0.1); color: var(--warn); border: 1px solid rgba(230,126,34,0.25); }
  .badge.out { background: rgba(192,57,43,0.1); color: var(--danger); border: 1px solid rgba(192,57,43,0.25); }

  /* Controls */
  .qty-control { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .qty-btn { background: var(--accent2); border: none; color: var(--accent-dark); width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
  .qty-btn:hover { background: var(--accent); color: #fff; }
  .qty-input { background: var(--surface); color: var(--text); width: 52px; height: 28px; text-align: center; font-family: var(--mono); font-size: 13px; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); outline: none; }
  .price-input { width: 60px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 5px 7px; border-radius: 3px; outline: none; text-align: center; }
  .price-input:focus { border-color: var(--accent); }
  .btn-delete { background: transparent; border: 1px solid rgba(192,57,43,0.3); color: var(--danger); font-family: var(--mono); font-size: 11px; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
  .btn-delete:hover { background: rgba(192,57,43,0.08); }

  /* Add product */
  .add-section { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px 24px; margin-bottom: 32px; }
  .add-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
  input { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 9px 11px; border-radius: 3px; outline: none; width: 100%; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: #bfcfc5; }
  .btn-add { background: var(--accent); color: #fff; border: none; font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 18px; border-radius: 3px; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { background: var(--accent-dark); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent-dark); color: #fff; font-family: var(--mono); font-size: 12px; padding: 12px 20px; border-radius: 4px; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .add-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Azoric <span>Peptides</span></h2>
    <p>Admin Access Required</p>
    <input class="login-input" type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="login-btn" id="loginBtn">Enter</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<div class="page">
  <header>
    <div class="logo-block">
      <h1>Azoric <span>Peptides</span></h1>
      <p>Inventory Manager</p>
    </div>
    <div class="header-right">
      <a href="/index.html" class="back-btn">← Order Form</a>
      <div class="admin-tag">Admin Panel</div>
    </div>
  </header>

  <div id="loading" class="loading">Loading inventory...</div>
  <div id="main" style="display:none;">

    <div class="section-label">Overview</div>
    <div class="stats">
      <div class="stat-card"><div class="label">Total Products</div><div class="value" id="statTotal">0</div></div>
      <div class="stat-card"><div class="label">Total Vials</div><div class="value" id="statVials">0</div></div>
      <div class="stat-card"><div class="label">Low / Out of Stock</div><div class="value" id="statLow" style="color:var(--warn);">0</div></div>
    </div>

    <div class="section-label">Current Inventory</div>
    <table class="inv-table">
      <thead>
        <tr>
          <th>Compound</th>
          <th>Price</th>
          <th>Status</th>
          <th>Stock</th>
          <th>Adjust</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody id="invBody"></tbody>
    </table>

    <div class="section-label">Add New Product</div>
    <div class="add-section">
      <div class="add-grid">
        <div><label>Compound Name</label><input type="text" id="newName" placeholder="e.g. BPC-157"></div>
        <div><label>Dose</label><input type="text" id="newDose" placeholder="e.g. 10mg"></div>
        <div><label>Price ($)</label><input type="number" id="newPrice" placeholder="0" min="0"></div>
        <div><label>Initial Stock</label><input type="number" id="newStock" placeholder="0" min="0"></div>
        <div><label>&nbsp;</label><button class="btn-add" onclick="addProduct()">+ Add</button></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://topaetuajpdzauvhrefu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvcGFldHVhanBkemF1dmhyZWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg0ODAsImV4cCI6MjA5NDYyNDQ4MH0.K3Lag09MNyEVZaGaMu7iNst2OyzcTfc2PWPPwrGhb9w';
  const ADMIN_PASSWORD = 'Research2026!';
  let inventory = [];

  document.getElementById('loginBtn').addEventListener('click', checkPassword);
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function checkPassword() {
    const input = document.getElementById('passwordInput');
    const error = document.getElementById('loginError');
    if (input.value === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      loadInventory();
    } else {
      input.style.borderColor = 'var(--danger)';
      error.style.display = 'block';
      input.value = '';
      setTimeout(() => { input.style.borderColor = ''; }, 1000);
    }
  }

  async function api(method, body, match) {
    const url = SUPABASE_URL + '/rest/v1/inventory' + (match || '');
    const res = await fetch(url, {
      method: method,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function loadInventory() {
    try {
      const data = await api('GET', null, '?order=id');
      inventory = Array.isArray(data) ? data : [];
    } catch(e) {
      console.error(e);
      document.getElementById('loading').textContent = 'Failed to load. Check console.';
      return;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    render();
  }

  function status(p) {
    if (p.stock === 0) return 'out';
    if (p.stock <= (p.low_at || 5)) return 'low';
    return 'high';
  }

  function render() {
    const tbody = document.getElementById('invBody');
    tbody.innerHTML = '';
    let vials = 0, low = 0;
    inventory.forEach(p => {
      const s = status(p);
      if (s !== 'high') low++;
      vials += p.stock;
      const max = Math.max(p.stock, (p.low_at||5) * 4, 20);
      const barW = Math.min(100, (p.stock / max) * 100);
      const label = s === 'out' ? 'Out' : s === 'low' ? 'Low' : 'In Stock';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="compound-name">${p.name}</div>${p.dose ? '<div class="compound-dose">' + p.dose + '</div>' : ''}</td>
        <td><div style="display:flex;align-items:center;gap:4px;"><span style="color:var(--accent-dark);">$</span><input type="number" class="price-input" value="${p.price}" min="0" onchange="setPrice(${p.id},this.value)" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"></div></td>
        <td><span class="badge ${s}">${label}</span></td>
        <td><div class="stock-display"><div class="stock-bar-wrap"><div class="stock-bar ${s}" style="width:${barW}%"></div></div><span class="stock-num ${s}">${p.stock}</span></div></td>
        <td><div class="qty-control"><button class="qty-btn" onclick="adj(${p.id},-1)">−</button><input class="qty-input" type="number" value="${p.stock}" min="0" onchange="setStock(${p.id},this.value)" id="s${p.id}"><button class="qty-btn" onclick="adj(${p.id},1)">+</button></div></td>
        <td><button class="btn-delete" onclick="del(${p.id})">Remove</button></td>
      `;
      tbody.appendChild(tr);
    });
    document.getElementById('statTotal').textContent = inventory.length;
    document.getElementById('statVials').textContent = vials;
    document.getElementById('statLow').textContent = low;
  }

  async function adj(id, delta) {
    const p = inventory.find(x => x.id === id);
    if (!p) return;
    p.stock = Math.max(0, p.stock + delta);
    document.getElementById('s' + id).value = p.stock;
    try { await api('PATCH', {stock: p.stock}, '?id=eq.' + id); toast('Updated'); } catch(e) { toast('Failed'); }
    render();
  }

  async function setStock(id, val) {
    const p = inventory.find(x => x.id === id);
    if (!p) return;
    p.stock = Math.max(0, parseInt(val) || 0);
    try { await api('PATCH', {stock: p.stock}, '?id=eq.' + id); toast('Updated'); } catch(e) { toast('Failed'); }
    render();
  }

  async function setPrice(id, val) {
    const p = inventory.find(x => x.id === id);
    if (!p) return;
    p.price = Math.max(0, parseInt(val) || 0);
    try { await api('PATCH', {price: p.price}, '?id=eq.' + id); toast('Price updated'); } catch(e) { toast('Failed'); }
  }

  async function del(id) {
    if (!confirm('Remove this product?')) return;
    try {
      await api('DELETE', null, '?id=eq.' + id);
      inventory = inventory.filter(x => x.id !== id);
      render();
      toast('Removed');
    } catch(e) { toast('Failed'); }
  }

  async function addProduct() {
    const name  = document.getElementById('newName').value.trim();
    const dose  = document.getElementById('newDose').value.trim();
    const price = parseInt(document.getElementById('newPrice').value) || 0;
    const stock = parseInt(document.getElementById('newStock').value) || 0;
    if (!name) { alert('Please enter a compound name.'); return; }
    try {
      const rows = await api('POST', {name, dose, stock, low_at: Math.max(1, Math.floor(stock * 0.2)), price});
      if (rows && rows[0]) inventory.push(rows[0]);
      render();
      document.getElementById('newName').value = '';
      document.getElementById('newDose').value = '';
      document.getElementById('newPrice').value = '';
      document.getElementById('newStock').value = '';
      toast('Product added');
    } catch(e) { toast('Add failed: ' + e.message); console.error(e); }
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>

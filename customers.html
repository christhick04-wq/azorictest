<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azoric Peptides — Customer Orders</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7f5;
    --surface: #ffffff;
    --border: #d4e0d4;
    --accent: #6a9b7e;
    --accent2: #e4efe8;
    --accent-dark: #4a7a5e;
    --text: #1f2d25;
    --muted: #7a9485;
    --danger: #c0392b;
    --warn: #e67e22;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; padding: 40px 20px 80px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(106,155,126,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(106,155,126,0.06) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .page { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

  /* Login */
  .login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 40px 36px; width: 100%; max-width: 360px; text-align: center; }
  .login-box h2 { font-family: var(--sans); font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .login-box h2 span { color: var(--accent); }
  .login-box p { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 28px; }
  .login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 14px; padding: 12px 14px; border-radius: 3px; outline: none; text-align: center; letter-spacing: 2px; margin-bottom: 12px; }
  .login-input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; background: var(--accent); color: #fff; border: none; font-family: var(--sans); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 13px; border-radius: 3px; cursor: pointer; }
  .login-btn:hover { background: var(--accent-dark); }
  .login-error { font-size: 11px; color: var(--danger); margin-top: 8px; display: none; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 16px; }
  .logo-block h1 { font-family: var(--sans); font-size: 26px; font-weight: 800; color: var(--text); }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .nav-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-dark); text-decoration: none; background: var(--accent2); border: 1px solid var(--accent); padding: 8px 16px; border-radius: 3px; white-space: nowrap; cursor: pointer; }
  .nav-btn:hover { background: var(--accent); color: #fff; }
  .admin-tag { background: #fff3cd; border: 1px solid #ffc107; color: #856404; font-size: 11px; letter-spacing: 2px; padding: 6px 14px; text-transform: uppercase; border-radius: 2px; }

  /* Section label */
  .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-dark); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; }
  .stat-card .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .stat-card .value { font-family: var(--sans); font-size: 28px; font-weight: 800; color: var(--accent-dark); }

  /* Search */
  .search-wrap { margin-bottom: 20px; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 11px 14px; border-radius: 3px; outline: none; }
  .search-input:focus { border-color: var(--accent); }

  /* Orders table */
  .orders-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--accent2); border-bottom: 1px solid var(--border); }
  th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 11px 14px; text-align: left; font-weight: 400; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f6f2; }
  td { padding: 11px 14px; vertical-align: top; }
  .order-num { font-weight: 700; color: var(--accent-dark); font-size: 11px; letter-spacing: 1px; }
  .customer-name { font-weight: 600; color: var(--text); }
  .customer-email { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .items-list { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .total { font-weight: 700; color: var(--accent-dark); }
  .badge { font-size: 9px; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; white-space: nowrap; display: inline-block; }
  .badge.ship { background: rgba(106,155,126,0.12); color: var(--accent-dark); border: 1px solid rgba(106,155,126,0.25); }
  .badge.pickup { background: rgba(230,126,34,0.1); color: var(--warn); border: 1px solid rgba(230,126,34,0.25); }
  .address { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .no-data { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Azoric <span>Peptides</span></h2>
    <p>Admin Access Required</p>
    <input class="login-input" type="password" id="passwordInput" placeholder="Enter password">
    <button class="login-btn" id="loginBtn">Enter</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<div class="page">
  <header>
    <div class="logo-block">
      <h1>Azoric <span>Peptides</span></h1>
      <p>Customer Orders</p>
    </div>
    <div class="header-right">
      <a href="https://project-9mi3b.vercel.app/admin.html" class="nav-btn">← Inventory</a>
      <a href="https://project-9mi3b.vercel.app/order.html" class="nav-btn">Order Form</a>
      <div class="admin-tag">Admin Panel</div>
    </div>
  </header>

  <div id="loading" class="loading">Loading orders...</div>
  <div id="main" style="display:none;">

    <div class="section-label">Overview</div>
    <div class="stats">
      <div class="stat-card"><div class="label">Total Orders</div><div class="value" id="statOrders">0</div></div>
      <div class="stat-card"><div class="label">Total Revenue</div><div class="value" id="statRevenue">$0</div></div>
      <div class="stat-card"><div class="label">Shipping</div><div class="value" id="statShipping">0</div></div>
      <div class="stat-card"><div class="label">Pick Up</div><div class="value" id="statPickup">0</div></div>
    </div>

    <div class="section-label">Order History</div>
    <div class="search-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="Search by name, email, order number..." oninput="filterOrders()">
    </div>
    <div class="orders-wrap">
      <table>
        <thead>
          <tr>
            <th>Order #</th>
            <th>Date</th>
            <th>Customer</th>
            <th>Address</th>
            <th>Items</th>
            <th>Payment</th>
            <th>Fulfillment</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://topaetuajpdzauvhrefu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvcGFldHVhanBkemF1dmhyZWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDg0ODAsImV4cCI6MjA5NDYyNDQ4MH0.K3Lag09MNyEVZaGaMu7iNst2OyzcTfc2PWPPwrGhb9w';
  const ADMIN_PASSWORD = 'Research2026!';
  let allOrders = [];

  document.getElementById('loginBtn').addEventListener('click', checkPassword);
  document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

  function checkPassword() {
    const input = document.getElementById('passwordInput');
    if (input.value === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      loadOrders();
    } else {
      input.style.borderColor = 'var(--danger)';
      document.getElementById('loginError').style.display = 'block';
      input.value = '';
      setTimeout(() => { input.style.borderColor = ''; }, 1000);
    }
  }

  async function loadOrders() {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/orders?order=created_at.desc', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      allOrders = await res.json();
      if (!Array.isArray(allOrders)) allOrders = [];
    } catch(e) {
      console.error(e);
      document.getElementById('loading').textContent = 'Failed to load orders.';
      return;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    renderStats();
    renderOrders(allOrders);
  }

  function renderStats() {
    const total = allOrders.length;
    const revenue = allOrders.reduce((s, o) => s + parseFloat(o.total || 0), 0);
    const shipping = allOrders.filter(o => o.fulfillment === 'ship').length;
    const pickup = allOrders.filter(o => o.fulfillment === 'pickup').length;
    document.getElementById('statOrders').textContent = total;
    document.getElementById('statRevenue').textContent = '$' + revenue.toFixed(0);
    document.getElementById('statShipping').textContent = shipping;
    document.getElementById('statPickup').textContent = pickup;
  }

  function renderOrders(orders) {
    const tbody = document.getElementById('ordersBody');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="no-data">No orders found</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    orders.forEach(o => {
      const date = new Date(o.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const items = Array.isArray(o.items) ? o.items.map(i => `${i.qty}x ${i.name} ${i.dose || ''}`).join('<br>') : '—';
      const fulfillClass = o.fulfillment === 'ship' ? 'ship' : 'pickup';
      const fulfillLabel = o.fulfillment === 'ship' ? 'Shipping' : 'Pick Up';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="order-num">${o.order_number || '—'}</div></td>
        <td style="white-space:nowrap;">${date}</td>
        <td>
          <div class="customer-name">${o.fname || ''} ${o.lname || ''}</div>
          <div class="customer-email">${o.email || ''}</div>
          <div class="customer-email">${o.phone || ''}</div>
        </td>
        <td><div class="address">${o.address || ''}<br>${o.city || ''}, ${o.state || ''} ${o.zip || ''}</div></td>
        <td><div class="items-list">${items}</div></td>
        <td style="font-size:11px;color:var(--muted);">${o.payment_method || '—'}</td>
        <td><span class="badge ${fulfillClass}">${fulfillLabel}</span></td>
        <td><span class="total">$${parseFloat(o.total || 0).toFixed(2)}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function filterOrders() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (!q) { renderOrders(allOrders); return; }
    const filtered = allOrders.filter(o =>
      (o.fname + ' ' + o.lname).toLowerCase().includes(q) ||
      (o.email || '').toLowerCase().includes(q) ||
      (o.order_number || '').toLowerCase().includes(q) ||
      (o.phone || '').toLowerCase().includes(q)
    );
    renderOrders(filtered);
  }
</script>
</body>
</html>
